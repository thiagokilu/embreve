<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plarte Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Mono:wght@300;400&family=Libre+Baskerville:ital@1&display=swap"
        rel="stylesheet" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'DM Mono', monospace;
            height: 100vh;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Top bar */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 3rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            opacity: 0;
            animation: fade-in 0.5s ease forwards 0.1s;
        }

        .topbar-left {
            font-family: 'Anton', sans-serif;
            font-size: 18px;
            letter-spacing: 0.05em;
        }

        .topbar-left span {
            color: #10b981;
        }

        .topbar-right {
            font-size: 10px;
            letter-spacing: 0.3em;
            color: rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
        }

        /* Center hero */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            text-align: center;
        }

        /* Vertical lines flanking */
        .hero::before,
        .hero::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 1px;
            background: rgba(16, 185, 129, 0.15);
        }

        .hero::before {
            left: 25%;
        }

        .hero::after {
            right: 25%;
        }

        .em-label {
            font-size: 10px;
            letter-spacing: 0.45em;
            color: #10b981;
            text-transform: uppercase;
            margin-bottom: 1.2rem;
            opacity: 0;
            animation: fade-up 0.6s ease forwards 0.4s;
        }

        .big-title {
            font-family: 'Anton', sans-serif;
            font-size: clamp(100px, 18vw, 240px);
            line-height: 0.85;
            letter-spacing: -0.01em;
            text-transform: uppercase;
            opacity: 0;
            animation: fade-up 0.7s ease forwards 0.55s;
        }

        .big-title .em {
            display: block;
            color: #10b981;
        }

        .big-title .breve {
            display: block;
            -webkit-text-stroke: 2.5px #fff;
            color: transparent;
        }

        .sub-row {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            margin-top: 2rem;
            opacity: 0;
            animation: fade-up 0.6s ease forwards 0.75s;
        }

        .sub-line {
            width: 40px;
            height: 1px;
            background: #10b981;
        }

        .sub-text {
            font-size: 10px;
            letter-spacing: 0.3em;
            color: rgba(255, 255, 255, 0.35);
            text-transform: uppercase;
        }

        .sub-text em {
            color: #10b981;
            font-style: normal;
        }

        /* Bottom bar */
        .bottombar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.8rem 3rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            opacity: 0;
            animation: fade-in 0.5s ease forwards 1s;
        }

        .bottombar-left {
            font-size: 10px;
            letter-spacing: 0.25em;
            color: rgba(255, 255, 255, 0.18);
            text-transform: uppercase;
            line-height: 1.9;
        }

        .bottombar-right {
            font-family: 'Libre Baskerville', serif;
            font-style: italic;
            font-size: clamp(28px, 4vw, 48px);
            color: rgba(255, 255, 255, 0.06);
            letter-spacing: 0.02em;
        }

        /* Animations */
        @keyframes fade-up {
            from {
                opacity: 0;
                transform: translateY(28px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fade-in {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @media (max-width: 600px) {

            .topbar,
            .bottombar {
                padding: 1.5rem;
            }

            .hero::before,
            .hero::after {
                display: none;
            }

            .bottombar-right {
                display: none;
            }
        }
    </style>
</head>

<body>

    <!-- Top bar -->
    <header class="topbar">
        <div class="topbar-left">PLARTE<span>.</span>LAB</div>
        <div class="topbar-right">48.8566° N &nbsp;/&nbsp; 2.3522° E</div>
    </header>

    <!-- Center -->
    <main class="hero">
        <p class="em-label">// Em construção</p>

        <div class="big-title">
            <span class="em">Em</span>
            <span class="breve">Breve</span>
        </div>

        <div class="sub-row">
            <div class="sub-line"></div>
            <span class="sub-text">Algo novo está sendo construído. <em>Volte em breve.</em></span>
            <div class="sub-line"></div>
        </div>
    </main>

    <!-- Bottom bar -->
    <footer class="bottombar">
        <div class="bottombar-left">
            Visão em <strong style="color:#fff;font-weight:400;">realidade digital</strong><br />
            BUILD_01 &nbsp;—&nbsp; 2025–2026
        </div>
        <div class="bottombar-right">Lab</div>
    </footer>

</body>

</html>
