<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plarte Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Mono:wght@300;400&family=Libre+Baskerville:ital@1&display=swap"
        rel="stylesheet" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'DM Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr;
        }

        /* LEFT COLUMN */
        .left {
            border-right: 1px solid #10b981;
            padding: 3rem 3rem 3rem 3.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .left::after {
            content: '';
            position: absolute;
            bottom: -120px;
            left: -80px;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.07) 0%, transparent 65%);
            pointer-events: none;
        }

        .top-label {
            font-size: 10px;
            letter-spacing: 0.35em;
            color: #10b981;
            text-transform: uppercase;
            opacity: 0;
            animation: in-left 0.6s ease forwards 0.1s;
        }

        .big-title {
            font-family: 'Anton', sans-serif;
            font-size: clamp(90px, 13vw, 185px);
            line-height: 0.88;
            letter-spacing: -0.01em;
            text-transform: uppercase;
            opacity: 0;
            animation: in-left 0.7s ease forwards 0.3s;
        }

        .big-title .em {
            color: #10b981;
            display: block;
        }

        .big-title .breve {
            display: block;
            -webkit-text-stroke: 2px #fff;
            color: transparent;
        }

        .bottom-left {
            opacity: 0;
            animation: in-left 0.6s ease forwards 0.7s;
        }

        .bottom-left p {
            font-size: 10px;
            letter-spacing: 0.25em;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            line-height: 2.2;
        }

        .bottom-left p strong {
            color: #fff;
            font-weight: 400;
        }

        /* RIGHT COLUMN */
        .right {
            padding: 3rem 3.5rem 3rem 3rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        .top-right {
            display: flex;
            justify-content: flex-end;
            opacity: 0;
            animation: in-right 0.6s ease forwards 0.2s;
        }

        .top-right span {
            font-size: 10px;
            letter-spacing: 0.3em;
            color: rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
        }

        .mid-right {
            opacity: 0;
            animation: in-right 0.8s ease forwards 0.5s;
        }

        .plarte-sub {
            font-family: 'Libre Baskerville', serif;
            font-style: italic;
            font-size: clamp(52px, 8vw, 110px);
            color: rgba(255, 255, 255, 0.08);
            line-height: 1;
            letter-spacing: 0.02em;
            margin-bottom: 2.5rem;
        }

        .divider {
            width: 100%;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
            margin-bottom: 2.5rem;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 1px;
            width: 0;
            background: #10b981;
            animation: line-grow 1s ease forwards 1s;
        }

        @keyframes line-grow {
            to {
                width: 100%;
            }
        }

        .desc {
            font-size: 11px;
            letter-spacing: 0.15em;
            color: rgba(255, 255, 255, 0.35);
            text-transform: uppercase;
            line-height: 2.2;
            max-width: 300px;
        }

        .desc em {
            color: #10b981;
            font-style: normal;
        }

        .bottom-right {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            opacity: 0;
            animation: in-right 0.6s ease forwards 0.8s;
        }

        .plarte-logo {
            font-family: 'Anton', sans-serif;
            font-size: 22px;
            letter-spacing: 0.05em;
            color: #fff;
        }

        .plarte-logo span {
            color: #10b981;
        }

        .coords {
            font-size: 9px;
            letter-spacing: 0.25em;
            color: rgba(255, 255, 255, 0.18);
            text-align: right;
            line-height: 2;
        }

        .vert-num {
            position: absolute;
            top: 50%;
            right: -1px;
            transform: translateY(-50%) rotate(90deg);
            font-size: 9px;
            letter-spacing: 0.4em;
            color: rgba(16, 185, 129, 0.4);
            text-transform: uppercase;
            white-space: nowrap;
            pointer-events: none;
        }

        @keyframes in-left {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes in-right {
            from {
                opacity: 0;
                transform: translateX(30px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @media (max-width: 640px) {
            body {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto;
                overflow-y: auto;
                height: auto;
                min-height: 100vh;
            }

            .left {
                border-right: none;
                border-bottom: 1px solid #10b981;
                padding: 2.5rem 2rem;
                gap: 2.5rem;
            }

            .right {
                padding: 2.5rem 2rem;
                gap: 2.5rem;
            }

            .vert-num {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="left">
        <div class="top-label">// Em construção</div>

        <div class="big-title">
            <span class="em">Em</span>
            <span class="breve">Breve</span>
        </div>

        <div class="bottom-left">
            <p>Visão em<br /><strong>realidade digital</strong><br />através da tecnologia.</p>
        </div>

        <div class="vert-num">Plarte.Lab — 2025</div>
    </div>

    <div class="right">
        <div class="top-right">
            <span>48.8566° N &nbsp;/&nbsp; 2.3522° E</span>
        </div>

        <div class="mid-right">
            <div class="plarte-sub">Lab</div>
            <div class="divider"></div>
            <p class="desc">
                Algo novo está<br />
                sendo construído.<br />
                <em>Volte em breve.</em>
            </p>
        </div>

        <div class="bottom-right">
            <div class="plarte-logo">PLARTE<span>.</span>LAB</div>
            <div class="coords">
                BUILD_01<br />
                2025 — 2026
            </div>
        </div>
    </div>

</body>

</html>
